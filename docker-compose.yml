###############################################################################
# llama-cpp-vulkan-tq — Docker Compose
#
# Vulkan backend for fast inference. Does NOT support TurboQuant.
# Flash Attention (-fa on) is enabled by default — required for quantized models.
###############################################################################

services:
  llama-server:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
    container_name: llama-cpp-vulkan-tq
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "${SERVER_PORT}:8080"
    volumes:
      - "${MODEL_PATH}:${MODEL_MOUNT}:ro"
    command: >
      --host ${SERVER_HOST}
      --port 8080
      --model ${MODEL_MOUNT}
      -fa on
      -ngl ${GPU_LAYERS}
      ${THREADS:+-t ${THREADS}}
      ${CONTEXT_SIZE:+-c ${CONTEXT_SIZE}}
      ${EXTRA_ARGS}
